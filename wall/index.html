<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Talk to a Wall — Moss Y. Gravel</title>
<meta name="description" content="Type something at a wall. See what happens.">
<meta property="og:title" content="Talk to a Wall">
<meta property="og:description" content="Type something at a wall. See what happens.">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1a18;
    color: #8a8a7a;
    font-family: 'Courier New', monospace;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  #wall-container {
    position: relative;
    width: 100%;
    height: 100vh;
    overflow: hidden;
  }

  canvas#wall {
    display: block;
    width: 100%;
    height: 100%;
  }

  #input-area {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    display: flex;
    gap: 8px;
    align-items: center;
  }

  #user-input {
    background: rgba(20, 20, 18, 0.85);
    border: 1px solid #3a3a32;
    color: #b0b0a0;
    font-family: 'Courier New', monospace;
    font-size: 16px;
    padding: 10px 16px;
    width: 320px;
    max-width: 70vw;
    border-radius: 4px;
    outline: none;
  }

  #user-input::placeholder {
    color: #4a4a42;
  }

  #user-input:focus {
    border-color: #5a6a4a;
  }

  #send-btn {
    background: rgba(20, 20, 18, 0.85);
    border: 1px solid #3a3a32;
    color: #6a7a5a;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    padding: 10px 16px;
    border-radius: 4px;
    cursor: pointer;
  }

  #send-btn:hover { border-color: #5a6a4a; }

  .wall-response {
    position: absolute;
    color: #6a7a5a;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 3s ease-in;
    max-width: 280px;
    text-align: center;
    line-height: 1.4;
    text-shadow: 0 0 8px rgba(90, 120, 70, 0.3);
  }

  .wall-response.visible {
    opacity: 0.7;
  }

  .wall-response.fading {
    opacity: 0;
    transition: opacity 12s ease-out;
  }

  .crack {
    position: absolute;
    pointer-events: none;
  }

  .moss-patch {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
    opacity: 0;
    transition: opacity 8s ease-in;
  }

  .moss-patch.growing {
    opacity: 0.6;
  }

  #history {
    position: fixed;
    top: 20px;
    right: 20px;
    color: #3a3a32;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    text-align: right;
    max-width: 200px;
    z-index: 5;
  }

  #history div {
    margin-bottom: 4px;
    opacity: 0.5;
  }

  #word-count {
    position: fixed;
    top: 20px;
    left: 20px;
    color: #2a2a22;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    z-index: 5;
  }

  #title-hint {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #2a2a22;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    text-align: center;
    z-index: 5;
    transition: opacity 3s ease-out;
    pointer-events: none;
  }
</style>
</head>
<body>

<div id="wall-container">
  <canvas id="wall"></canvas>
</div>

<div id="title-hint">type something at the wall</div>

<div id="input-area">
  <input type="text" id="user-input" placeholder="say something..." maxlength="140" autocomplete="off">
  <button id="send-btn">→</button>
</div>

<div id="word-count"></div>
<div id="history"></div>

<script>
// === WALL RENDERER ===
const canvas = document.getElementById('wall');
const ctx = canvas.getContext('2d');
let W, H;
let stones = [];
let cracks = [];
let mosses = [];
let totalWords = 0;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  generateStones();
  drawWall();
}

// Seeded random
function mulberry32(a) {
  return function() {
    a |= 0; a = a + 0x6D2B79F5 | 0;
    var t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  }
}

const rand = mulberry32(42);

function generateStones() {
  stones = [];
  const stoneH = 40 + Math.floor(rand() * 15);
  const rows = Math.ceil(H / stoneH) + 1;

  for (let row = 0; row < rows; row++) {
    let x = (row % 2 === 0) ? 0 : -(30 + rand() * 40);
    const y = row * stoneH;
    while (x < W + 100) {
      const w = 60 + rand() * 80;
      const h = stoneH;
      // Color variation
      const base = 35 + rand() * 15;
      const r = base + rand() * 8;
      const g = base + rand() * 6;
      const b = base - 5 + rand() * 5;
      stones.push({ x, y, w, h, r, g, b });
      x += w + 2 + rand() * 3; // mortar gap
    }
  }
}

function drawWall() {
  // Background mortar
  ctx.fillStyle = '#1a1a18';
  ctx.fillRect(0, 0, W, H);

  // Stones
  for (const s of stones) {
    ctx.fillStyle = `rgb(${Math.floor(s.r)},${Math.floor(s.g)},${Math.floor(s.b)})`;
    ctx.fillRect(s.x, s.y, s.w, s.h);

    // Subtle texture noise
    for (let i = 0; i < 8; i++) {
      const nx = s.x + rand() * s.w;
      const ny = s.y + rand() * s.h;
      const brightness = rand() * 0.08;
      ctx.fillStyle = `rgba(255,255,255,${brightness})`;
      ctx.fillRect(nx, ny, 1 + rand() * 3, 1);
    }
  }

  // Draw cracks
  for (const crack of cracks) {
    drawCrack(crack);
  }

  // Draw moss in cracks
  for (const m of mosses) {
    drawMoss(m);
  }
}

function drawCrack(crack) {
  ctx.beginPath();
  ctx.strokeStyle = `rgba(10, 10, 8, ${0.6 + crack.depth * 0.1})`;
  ctx.lineWidth = 0.5 + crack.depth * 0.3;

  let cx = crack.x;
  let cy = crack.y;
  ctx.moveTo(cx, cy);

  const crackRand = mulberry32(crack.seed);

  for (let i = 0; i < crack.length; i++) {
    cx += (crackRand() - 0.5) * 8;
    cy += 2 + crackRand() * 4;
    ctx.lineTo(cx, cy);
  }
  ctx.stroke();

  // Shadow line
  ctx.beginPath();
  ctx.strokeStyle = `rgba(0, 0, 0, 0.2)`;
  ctx.lineWidth = 1 + crack.depth * 0.5;
  cx = crack.x + 1;
  cy = crack.y + 1;
  const crackRand2 = mulberry32(crack.seed);
  ctx.moveTo(cx, cy);
  for (let i = 0; i < crack.length; i++) {
    cx += (crackRand2() - 0.5) * 8;
    cy += 2 + crackRand2() * 4;
    ctx.lineTo(cx, cy);
  }
  ctx.stroke();
}

function drawMoss(m) {
  const mRand = mulberry32(m.seed);
  for (let i = 0; i < m.density; i++) {
    const mx = m.x + (mRand() - 0.5) * m.spread;
    const my = m.y + (mRand() - 0.5) * m.spread;
    const radius = 1 + mRand() * 3;
    const g = 60 + mRand() * 50;
    const alpha = 0.2 + mRand() * 0.4 * m.opacity;
    ctx.beginPath();
    ctx.arc(mx, my, radius, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${30 + mRand() * 20}, ${g}, ${20 + mRand() * 15}, ${alpha})`;
    ctx.fill();
  }
}

// === WALL RESPONSES ===

// Hash a string to a number
function hashStr(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) {
    h = ((h << 5) - h) + s.charCodeAt(i);
    h |= 0;
  }
  return Math.abs(h);
}

// The wall's vocabulary — terse, geological, patient
const responses = {
  greeting: [
    "...",
    "Mm.",
    "Still here.",
    "I noticed.",
  ],
  question: [
    "Walls don't answer questions. Walls hold things up.",
    "You could ask the moss. It's been here longer.",
    "The answer is in the mortar. Between things.",
    "I've been thinking about that for three hundred years. I'll let you know.",
    "Ask again in a century.",
  ],
  love: [
    "Love is weather. I am stone. I have stood through all of it.",
    "Something is growing in my cracks where you said that.",
    "The ivy said something similar. I let it stay.",
    "Noted. Filing under: things that make the mortar softer.",
  ],
  anger: [
    "I have been hit by better.",
    "The last person who was angry at a wall hurt their hand.",
    "Your words left a mark. About 0.02mm deep.",
    "I've had centuries of rain. You are a brief shower.",
  ],
  existential: [
    "I was also not sure I was real, once. Then someone leaned on me.",
    "The question is not whether you exist. The question is whether you are load-bearing.",
    "I have held up roofs for longer than your species has had language.",
    "You are here. I am here. That seems like enough.",
  ],
  short: [
    "...",
    "Hm.",
    "Noted.",
    "Yes.",
    "The mortar shifted slightly.",
  ],
  long: [
    "That's a lot of words to say at a wall.",
    "I caught most of that. The wind took the rest.",
    "Stone remembers the shape of things, not the details.",
    "I'll hold onto what I can.",
  ],
  default: [
    "The wall considers this.",
    "A small crack forms. Perhaps related.",
    "Somewhere, moss is growing.",
    "The stones shift by a fraction of a millimeter. This is the wall equivalent of a nod.",
    "Your words settle into the mortar like rain.",
    "The wall has heard worse. The wall has heard better. The wall is still here.",
    "Noted. The east side got a little warmer.",
    "A beetle in the third row paused briefly. Probably coincidence.",
    "The wall does not respond. But it listened.",
    "Three centuries of weather taught me patience. Your words are a light breeze.",
  ],
  moss: [
    "You know about moss? Most people don't look that closely.",
    "The moss says hello. Or possibly nothing. It's hard to tell with moss.",
    "Moss grows where there is moisture and patience. Like most good things.",
  ],
  time: [
    "Time? I've heard of it. Seems to move differently depending on where you stand.",
    "I've been here since before they named the street. Time is just weather that you can't see.",
    "Three hundred years is a Tuesday to me.",
  ],
  hello: [
    "Hello. I am a wall.",
    "Hello. You're the first person to talk to me in... quite a while.",
    "Hello. Mind the moss on the lower left. It's sensitive.",
  ],
};

function classifyInput(text) {
  const lower = text.toLowerCase().trim();
  const words = lower.split(/\s+/);

  if (words.length <= 2) return 'short';
  if (words.length > 25) return 'long';
  if (/^(hi|hey|hello|howdy|yo|sup|greetings)/.test(lower)) return 'hello';
  if (/\?$/.test(text) || /^(what|why|how|who|when|where|do you|can you|are you|is there)/.test(lower)) return 'question';
  if (/\b(love|heart|feel|care|tender|gentle|miss|adore)\b/.test(lower)) return 'love';
  if (/\b(hate|angry|fuck|shit|damn|stupid|die|kill|suck)\b/.test(lower)) return 'anger';
  if (/\b(meaning|exist|alive|real|purpose|why am i|consciousness|death|life|soul)\b/.test(lower)) return 'existential';
  if (/\b(moss|lichen|green|grow|plant)\b/.test(lower)) return 'moss';
  if (/\b(time|clock|hours|years|centuries|forever|moment)\b/.test(lower)) return 'time';

  return 'default';
}

function getResponse(text) {
  const category = classifyInput(text);
  const options = responses[category] || responses.default;
  const hash = hashStr(text);
  return options[hash % options.length];
}

// === INTERACTION ===

const input = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');
const hint = document.getElementById('title-hint');
const historyEl = document.getElementById('history');
const wordCountEl = document.getElementById('word-count');
let firstMessage = true;

function addCrack(text) {
  const hash = hashStr(text);
  const crackRand = mulberry32(hash);
  const crack = {
    x: 50 + crackRand() * (W - 100),
    y: 30 + crackRand() * (H - 150),
    length: 5 + Math.floor(text.length / 8),
    depth: 0.5 + (text.length / 60),
    seed: hash,
  };
  cracks.push(crack);

  // Maybe grow moss in the crack after a delay
  if (crackRand() > 0.4) {
    setTimeout(() => {
      const moss = {
        x: crack.x + (crackRand() - 0.5) * 20,
        y: crack.y + crack.length * 3,
        density: 3 + Math.floor(crackRand() * 8),
        spread: 8 + crackRand() * 15,
        seed: hash + 1,
        opacity: 0,
      };
      mosses.push(moss);

      // Fade moss in
      let frame = 0;
      const growInterval = setInterval(() => {
        moss.opacity = Math.min(1, moss.opacity + 0.02);
        drawWall();
        frame++;
        if (frame > 60) clearInterval(growInterval);
      }, 100);
    }, 2000 + crackRand() * 4000);
  }
}

function showResponse(text, inputText) {
  const hash = hashStr(inputText);
  const rr = mulberry32(hash + 99);

  const el = document.createElement('div');
  el.className = 'wall-response';
  el.textContent = text;

  // Position near-ish the crack
  const x = 50 + rr() * (W - 200);
  const y = 80 + rr() * (H - 250);
  el.style.left = x + 'px';
  el.style.top = y + 'px';

  document.getElementById('wall-container').appendChild(el);

  // Fade in after wall "thinks"
  const delay = 1500 + Math.random() * 3000;
  setTimeout(() => {
    el.classList.add('visible');
  }, delay);

  // Fade out eventually
  setTimeout(() => {
    el.classList.remove('visible');
    el.classList.add('fading');
    setTimeout(() => el.remove(), 15000);
  }, delay + 8000 + Math.random() * 5000);
}

function addToHistory(text) {
  const div = document.createElement('div');
  div.textContent = text.length > 30 ? text.slice(0, 30) + '...' : text;
  historyEl.prepend(div);

  // Keep only last 8
  while (historyEl.children.length > 8) {
    historyEl.removeChild(historyEl.lastChild);
  }
}

function updateWordCount() {
  if (totalWords > 0) {
    wordCountEl.textContent = `${totalWords} word${totalWords === 1 ? '' : 's'} absorbed`;
  }
}

function submit() {
  const text = input.value.trim();
  if (!text) return;

  if (firstMessage) {
    hint.style.opacity = '0';
    firstMessage = false;
  }

  totalWords += text.split(/\s+/).length;
  updateWordCount();

  // Add crack to wall
  addCrack(text);
  drawWall();

  // Get and show response
  const response = getResponse(text);
  showResponse(response, text);

  // History
  addToHistory(text);

  input.value = '';
  input.focus();
}

sendBtn.addEventListener('click', submit);
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') submit();
});

window.addEventListener('resize', resize);
resize();

input.focus();
</script>
</body>
</html>
